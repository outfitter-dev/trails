name: Setup
description: Install Bun and dependencies (requires checkout first)

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: .bun-version

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
