name: 'Trails CI Governance'
description: 'Run Trails governance checks (warden + drift)'
inputs:
  fail-on:
    description: 'Minimum severity to fail on (error or warning)'
    default: 'error'
runs:
  using: 'composite'
  steps:
    - name: Run governance checks
      shell: bash
      continue-on-error: true
      id: governance
      run: bun apps/ci/bin/ci.ts --format github --fail-on ${{ inputs.fail-on }}
    - name: Report result
      shell: bash
      if: steps.governance.outcome == 'failure'
      run: echo "::warning::Governance checks failed or could not run"
