name: CI

on:
  pull_request:
    types: [labeled, opened, reopened, synchronize, unlabeled]
    branches-ignore:
      - '**/graphite-base/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Turbo remote cache — speeds up CI by sharing build artifacts across runs.
# Forks: these secrets won't be available, and turbo will fall back to local
# caching automatically. CI still works, just without cross-run cache hits.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_API: https://turbo-cache.outfitter.dev
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Build
        run: bun run build

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Lint
        run: bun run lint

      - name: Structural lint
        run: bun run lint:ast-grep

      - name: Format check
        run: bun run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Test
        run: bun run test

      - name: Tree clean
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

  governance:
    name: Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Warden
        run: bun apps/ci/bin/ci.ts --format github --fail-on error

  changeset:
    name: Changeset
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Collect PR file list
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/files" \
            --jq '.[].filename' \
            > "$RUNNER_TEMP/changed-files.txt"

      - name: Check changeset
        env:
          RELEASE_NONE: ${{ contains(github.event.pull_request.labels.*.name, 'release:none') }}
        run: |
          args=(--changed-files "$RUNNER_TEMP/changed-files.txt")
          if [ "$RELEASE_NONE" = "true" ]; then
            args+=(--release-none)
          fi
          bun run changeset:check -- "${args[@]}"

  ci-gate:
    name: CI Gate
    if: always()
    needs: [build, lint, typecheck, test, governance, changeset]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | \`${{ needs.build.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint & Format | \`${{ needs.lint.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Typecheck | \`${{ needs.typecheck.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | \`${{ needs.test.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Governance | \`${{ needs.governance.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Changeset | \`${{ needs.changeset.result }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Require all jobs to pass
        if: contains(needs.*.result, 'failure') && !cancelled()
        run: exit 1
