# Review Bot Gate
#
# Enforces that Greptile, Codex, and Devin have all posted on the current PR
# revision (or been explicitly waived via `review-bot-na:` comment) before a
# queue label (`queue:merge`, `queue:priority`, `queue:hotfix`) is allowed to
# stick. If a required artifact is missing, the gate removes any queue labels
# and fails the check.
#
# This workflow is intended to be a required check in main-branch protection.
# Branch protection is not configured from code — repo maintainers must add
# `Review Bot Gate / Review Bot Gate` to the required status checks list so
# GitHub mergeability actually hinges on this gate rather than on advisory
# label removal alone.
#
# Triggers cover label, code-push, and artifact events so the gate is reactive
# to late-arriving bot reviews and waiver comments:
#   - `pull_request` (labeled, reopened, synchronize, ready_for_review) picks
#     up PR lifecycle changes and label additions.
#   - `issue_comment` (created, edited) picks up late waiver and bot comments.
#   - `pull_request_review` (submitted, edited, dismissed) picks up late bot
#     reviews and state changes.
#
# Manual test scenarios (no unit tests — this is the regression checklist):
#   1. Apply a queue label before all bots have posted -> gate removes the
#      label. Then have the missing bot post on the current revision -> the
#      `issue_comment` or `pull_request_review` trigger re-runs the gate and
#      label re-application is allowed.
#   2. Apply a queue label before all bots have posted -> gate removes the
#      label. Then a repo member posts `review-bot-na: <bot>` -> the
#      `issue_comment` trigger re-runs the gate and label re-application is
#      allowed.
#   3. Greptile posts an error comment ("Greptile encountered an error while
#      reviewing this PR") on the current revision -> gate blocks queue entry
#      even if the other bots are satisfied.

name: Review Bot Gate

on:
  pull_request:
    types: [labeled, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  review-bot-gate:
    name: Review Bot Gate
    runs-on: ubuntu-latest
    steps:
      - name: Enforce queue label review policy
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const queueLabels = new Set([
              'queue:hotfix',
              'queue:merge',
              'queue:priority',
            ]);
            const botConfigs = [
              {
                display: 'Codex',
                key: 'codex',
                logins: new Set(['chatgpt-codex-connector']),
              },
              {
                display: 'Devin',
                key: 'devin',
                logins: new Set(['devin-ai-integration']),
              },
              {
                display: 'Greptile',
                key: 'greptile',
                logins: new Set(['greptile-apps', 'greptile-apps[bot]']),
              },
            ];
            const greptileErrorPattern =
              /Greptile encountered an error while reviewing this PR/i;
            const memberAssociations = new Set([
              'COLLABORATOR',
              'MEMBER',
              'OWNER',
            ]);
            // Strict key list: one or more [a-z] tokens separated by commas and
            // optional whitespace. Any non-comma prose (e.g. "greptile this is
            // covered") terminates the match so the trailing words are not
            // captured as a bogus bot key.
            const waiverPattern =
              /review-bot-na:\s*([a-z]+(?:\s*,\s*[a-z]+)*)/gi;

            // Event-shape adapter. `pull_request` and `pull_request_review`
            // events ship the full PR object on the payload. `issue_comment`
            // events only attach an `issue` (with a `pull_request` marker if
            // the comment is on a PR) — we have to fetch the PR to get the
            // same shape (labels, head ref, number). One extra REST call per
            // PR comment is acceptable given the artifact-trigger frequency;
            // the subsequent GraphQL pagination dominates the rate-limit
            // footprint either way.
            let pullRequest = context.payload.pull_request ?? null;
            if (!pullRequest && context.payload.issue?.pull_request) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              pullRequest = data;
            }

            if (!pullRequest) {
              core.info('Not a pull request event; skipping.');
              return;
            }

            const activeQueueLabels = pullRequest.labels
              .map((label) => label.name)
              .filter((name) => queueLabels.has(name));
            if (activeQueueLabels.length === 0) {
              core.notice('No queue labels present; skipping gate.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pullRequest.number;
            const MAX_PAGES = 10;
            const initialQuery = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    headRefOid
                    commits(last: 1) {
                      nodes {
                        commit {
                          committedDate
                          pushedDate
                          oid
                        }
                      }
                    }
                    comments(first: 100) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        author {
                          login
                        }
                        authorAssociation
                        body
                        createdAt
                      }
                    }
                    reviews(first: 100) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        author {
                          login
                        }
                        body
                        state
                        submittedAt
                        commit {
                          oid
                        }
                      }
                    }
                  }
                }
              }
            `;

            const commentsPageQuery = `
              query($owner: String!, $repo: String!, $number: Int!, $cursor: String!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    comments(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        author {
                          login
                        }
                        authorAssociation
                        body
                        createdAt
                      }
                    }
                  }
                }
              }
            `;

            const reviewsPageQuery = `
              query($owner: String!, $repo: String!, $number: Int!, $cursor: String!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviews(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        author {
                          login
                        }
                        body
                        state
                        submittedAt
                        commit {
                          oid
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(initialQuery, {
              owner,
              repo,
              number,
            });
            const pr = data.repository.pullRequest;
            const latestCommit = pr.commits.nodes[0]?.commit;
            if (!latestCommit) {
              core.setFailed('Unable to determine the latest PR commit.');
              return;
            }

            const paginate = async (
              label,
              pageQuery,
              initialPageInfo,
              extract
            ) => {
              const nodes = [];
              let pageInfo = initialPageInfo;
              let pages = 1;
              while (pageInfo?.hasNextPage && pageInfo.endCursor) {
                if (pages >= MAX_PAGES) {
                  core.warning(
                    `Reached ${MAX_PAGES}-page cap while fetching ${label}; ` +
                      'older entries may be omitted from gate evaluation.'
                  );
                  break;
                }
                const pageData = await github.graphql(pageQuery, {
                  owner,
                  repo,
                  number,
                  cursor: pageInfo.endCursor,
                });
                const connection = extract(pageData);
                nodes.push(...connection.nodes);
                pageInfo = connection.pageInfo;
                pages += 1;
              }
              return nodes;
            };

            const additionalComments = await paginate(
              'comments',
              commentsPageQuery,
              pr.comments.pageInfo,
              (pageData) => pageData.repository.pullRequest.comments
            );
            const additionalReviews = await paginate(
              'reviews',
              reviewsPageQuery,
              pr.reviews.pageInfo,
              (pageData) => pageData.repository.pullRequest.reviews
            );

            pr.comments.nodes = [...pr.comments.nodes, ...additionalComments];
            pr.reviews.nodes = [...pr.reviews.nodes, ...additionalReviews];

            // Reviews are gated on commit OID (exact revision match). Comments
            // fall back to timestamp comparison. pushedDate is preferred over
            // committedDate so cherry-picked old commits don't admit pre-push
            // stale bot comments.
            const latestCommitAt = Date.parse(
              latestCommit.pushedDate ?? latestCommit.committedDate
            );

            const waivedBots = new Set();
            for (const comment of pr.comments.nodes) {
              if (!memberAssociations.has(comment.authorAssociation)) {
                continue;
              }
              const createdAt = comment.createdAt
                ? Date.parse(comment.createdAt)
                : NaN;
              if (Number.isNaN(createdAt) || createdAt < latestCommitAt) {
                continue;
              }
              for (const match of comment.body.matchAll(waiverPattern)) {
                const keys = match[1]
                  .split(',')
                  .map((part) => part.trim().toLowerCase())
                  .filter(Boolean);
                for (const key of keys) {
                  if (key === 'all') {
                    for (const bot of botConfigs) {
                      waivedBots.add(bot.key);
                    }
                    continue;
                  }
                  if (botConfigs.some((bot) => bot.key === key)) {
                    waivedBots.add(key);
                    continue;
                  }
                  // Surface typo'd or unsupported waiver keys in the Actions
                  // log so stale waivers don't silently disappear.
                  core.warning(
                    `Ignoring unrecognized review-bot-na key \`${key}\` in comment by @${comment.author?.login ?? 'unknown'}. Valid keys: ${botConfigs.map((bot) => bot.key).join(', ')}, all.`
                  );
                }
              }
            }

            const getLatestArtifact = (botConfig) => {
              const reviewArtifacts = pr.reviews.nodes
                .filter((review) => {
                  const login = review.author?.login;
                  const submittedAt = review.submittedAt
                    ? Date.parse(review.submittedAt)
                    : NaN;
                  if (!login || Number.isNaN(submittedAt)) {
                    return false;
                  }
                  return (
                    botConfig.logins.has(login) &&
                    review.commit?.oid === pr.headRefOid
                  );
                })
                .map((review) => ({
                  body: review.body ?? '',
                  kind: 'review',
                  time: review.submittedAt,
                }));

              const commentArtifacts = pr.comments.nodes
                .filter((comment) => {
                  const login = comment.author?.login;
                  const createdAt = comment.createdAt
                    ? Date.parse(comment.createdAt)
                    : NaN;
                  if (!login || Number.isNaN(createdAt)) {
                    return false;
                  }
                  return (
                    botConfig.logins.has(login) && createdAt >= latestCommitAt
                  );
                })
                .map((comment) => ({
                  body: comment.body ?? '',
                  kind: 'comment',
                  time: comment.createdAt,
                }));

              return [...reviewArtifacts, ...commentArtifacts].sort(
                (left, right) => Date.parse(right.time) - Date.parse(left.time)
              )[0];
            };

            const problems = [];
            const satisfied = [];

            for (const bot of botConfigs) {
              if (waivedBots.has(bot.key)) {
                satisfied.push(`${bot.display}: waived`);
                continue;
              }

              const artifact = getLatestArtifact(bot);
              if (!artifact) {
                problems.push(
                  `${bot.display} has not posted on the current PR revision.`
                );
                continue;
              }

              if (
                bot.key === 'greptile' &&
                greptileErrorPattern.test(artifact.body)
              ) {
                problems.push(
                  'Greptile reported a review error on the current PR revision.'
                );
                continue;
              }

              satisfied.push(`${bot.display}: ${artifact.kind} posted`);
            }

            if (problems.length === 0) {
              await core.summary
                .addHeading('Review Bot Gate')
                .addList([
                  `Latest commit: \`${latestCommit.oid.slice(0, 12)}\``,
                  ...satisfied,
                ])
                .write();
              core.notice('Queue labels are allowed for this PR revision.');
              return;
            }

            for (const label of activeQueueLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: number,
                  name: label,
                });
              } catch (error) {
                core.warning(`Failed to remove label ${label}: ${error.message}`);
              }
            }

            await core.summary
              .addHeading('Review Bot Gate')
              .addList([
                `Removed queue label(s): ${activeQueueLabels.join(', ')}`,
                `Latest commit: \`${latestCommit.oid.slice(0, 12)}\``,
                ...problems,
              ])
              .write();
            core.setFailed(problems.join(' '));
