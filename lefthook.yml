pre-commit:
  piped: true
  commands:
    format_guard:
      run: bun run format:guard
    format:
      glob: '**/*.{ts,tsx,js,jsx,json,jsonc}'
      run: bun run format:file {staged_files}
      stage_fixed: true
    markdownlint:
      glob: '*.md'
      run: bun run mdlint:fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    test:
      run: bun run test
    typecheck:
      run: bun run typecheck
