# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "trails"

[setup]
script = '''
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"

export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
export PATH="$BUN_INSTALL/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"

git_dir="$(git rev-parse --git-dir 2>/dev/null || true)"
common_dir="$(git rev-parse --git-common-dir 2>/dev/null || true)"

if [ -n "$git_dir" ] && [ -n "$common_dir" ] && [ "$git_dir" != "$common_dir" ]; then
  current_branch="$(git branch --show-current 2>/dev/null || true)"

  echo ""
  echo "Codex worktree note:"
  echo "  This checkout is a linked Git worktree."
  echo "  Current branch: ${current_branch:-detached HEAD}"
  echo "  Graphite branches and metadata are shared with the main Trails checkout."
  echo "  Treat existing stacks with care: inspect before syncing, restacking, submitting, or deleting branches."

  if command -v gt >/dev/null 2>&1; then
    stack_log="$(gt log --no-interactive 2>/dev/null || true)"

    if printf '%s\n' "$stack_log" | grep -q '^◯ '; then
      echo ""
      echo "  Existing Graphite stack context detected:"
      printf '%s\n' "$stack_log" | sed 's/^/    /'
      echo ""
      echo "  Prefer read-only stack inspection during setup. Do not run gt sync, gt restack,"
      echo "  gt submit, gt branch delete, or gt branch untrack from lifecycle hooks."
    fi
  fi

  echo ""
fi

./scripts/bootstrap.sh

git status --short --branch
gt log --no-interactive || true

'''

[cleanup]
script = '''
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"

export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
export PATH="$BUN_INSTALL/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"

if [ -n "$(git status --porcelain)" ]; then
  echo "Codex cleanup: worktree still has changes; only removing ignored/local runtime state." >&2
fi

rm -rf \
  .turbo \
  .trails-tmp \
  .tmp-tests \
  .try

rm -f \
  .trails/trails.db \
  .trails/trails.db-shm \
  .trails/trails.db-wal \
  .trails/dev/tracing.db \
  .trails/dev/tracing.db-shm \
  .trails/dev/tracing.db-wal
'''
