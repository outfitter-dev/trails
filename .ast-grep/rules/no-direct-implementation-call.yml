id: trails-no-direct-implementation-call
language: TypeScript
severity: error
message: Use ctx.compose(...) instead of direct .implementation() calls.
ignores:
  - '**/__tests__/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - 'packages/testing/**'
  - 'packages/warden/**'
rule:
  pattern: $TARGET.implementation($$$ARGS)
